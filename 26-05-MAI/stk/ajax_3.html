<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <h1>Mitarbeiter gehalt</h1>
    <select name="selection" id="selection">
        <option>Please select</option>
        <option value="0">Mertens</option>
        <option value="1">John</option>
        <option value="2">Schulz</option>
        <option value="3">Peter</option>
      </select> 
  
      <div id="output"></div>
<script>

// AJAX

let xhr = new XMLHttpRequest();

window.addEventListener("load", function(){
    document.getElementById("selection").addEventListener("change", auswahl);
});

function auswahl(){
    
    let selectedIndex = document.getElementById("selection").value;

    // Falls "Please select" gewählt wurde, breche ab
    if(selectedIndex === "Please select") {
        document.getElementById("output").innerHTML = "";
        return;
    }

    xhr.open("get", "gehalt.json");
    xhr.send();

    xhr.onreadystatechange = () => {
        if(xhr.readyState == 4 && xhr.status == 200){
            let result = JSON.parse(xhr.responseText);
            let outputDiv = document.getElementById("output");
            
            // Leere den alten Inhalt
            outputDiv.innerHTML = ""; 

            result.forEach((element, index) => {
                // Prüfe, ob der Array-Index mit der Auswahl übereinstimmt
                if(index == selectedIndex) {
                    // Erstelle den Anzeige-Text
                    let info = `Mitarbeiter: ${element.Name} <br> Gehalt: ${element.Gehalt}`;
                    
                    // Schreibe den Text in das Output-Div
                    outputDiv.innerHTML = info;
                }
            });
        }
    }
}


</script>


</body>
</html>
