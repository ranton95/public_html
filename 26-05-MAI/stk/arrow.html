<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <h1>Arrow functions</h1>
  
      <div id="output"></div>
<script>
    let numbers = [1,2,3];
    let age = [20,30,40];

    //numbers.forEach( function(x){ console.log(x);} );
    // Arrow-Schreibweise: Parameter => {Funktion}
    numbers.forEach( (number, index)=>{
        const age2 = age[index];
        console.log(number, age2);

    }); 


</script>


</body>
</html>
