<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <button id="myButton">GET JSON </button>
    <div id="output"></div>

<script>

// AJAX

// 1. Instanz von the xml http request
let xhr = new XMLHttpRequest();

// we only want to get the data from the json

// 2. Event listener init
window.addEventListener("load", function(){
    document.getElementById("myButton").addEventListener("click", getJSON);
});


function getJSON(){
    // 3. HTTP Anfrage vorbereiten
    xhr.open("get", "gehalt.json");

    // 4. Absenden der Anfrage 
    xhr.send();

    //Antwort from server abwartern
    xhr.onreadystatechange = function(){
        if(xhr.readyState == 4 && xhr.status == 200){
            let result = JSON.parse(xhr.responseText);
            console.log(result);
        }
    }

}


</script>


</body>
</html>
